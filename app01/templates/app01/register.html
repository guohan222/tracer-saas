{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'plugin/bootstrap-5.3.0-alpha2-dist/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'plugin/fontawesome-free-7.2.0-web/css/all.min.css' %}">
</head>
<body>
<form action="">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
            {{ field }}
            <!-- 普通输入框下方错误信息块 -->
            <span class='err-msg'></span>
        </div>
    {% endfor %}
    <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary btn-lg">创建</button>
    </div>
</form>

</body>
</html>
